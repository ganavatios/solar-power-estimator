name: Auto Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    # Skip if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      
      - name: Set up Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Read current version
        id: read_version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          
          # Split version into major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
      
      - name: Determine version bump type
        id: bump_type
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          
          # Check if commit message contains [patch]
          if echo "$COMMIT_MSG" | grep -iq "\[patch\]"; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=minor" >> $GITHUB_OUTPUT
          fi
      
      - name: Calculate new version
        id: new_version
        run: |
          MAJOR=${{ steps.read_version.outputs.major }}
          MINOR=${{ steps.read_version.outputs.minor }}
          PATCH=${{ steps.read_version.outputs.patch }}
          BUMP_TYPE=${{ steps.bump_type.outputs.type }}
          
          if [ "$BUMP_TYPE" = "patch" ]; then
            PATCH=$((PATCH + 1))
          else
            MINOR=$((MINOR + 1))
            PATCH=0
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version will be: $NEW_VERSION"
      
      - name: Update version.json
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          CURRENT_DATE=$(date -u +"%Y-%m-%d")
          CURRENT_DATETIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Update version.json with new version, date and datetime
          jq --arg version "$NEW_VERSION" --arg date "$CURRENT_DATE" --arg datetime "$CURRENT_DATETIME" \
            '.version = $version | .date = $date | .datetime = $datetime' \
            version.json > version.tmp.json
          
          mv version.tmp.json version.json
          
          echo "Updated version.json to $NEW_VERSION (deployed: $CURRENT_DATETIME)"
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet version.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add version.json
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.version }} [skip ci]"
          git push